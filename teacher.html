<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Espace intervenant - Association Mille Voiles</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-blue: #004080;
            --primary-light-blue: #0066cc;
            --primary-yellow: #ffd633;
            --green: #27ae60;
            --red: #e74c3c;
            --orange: #f39c12;
            --gray: #95a5a6;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.2);
            --border-radius: 12px;
        }
        body {
            font-family: 'Open Sans', sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
        }
        @media (max-width: 768px) {
            body { transform: scale(0.8); transform-origin: top center; width: 125%; min-height: 125vh; left: -12.5%; position: relative; }
            html { overflow-x: hidden; }
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        .header {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-light-blue));
            color: white;
            padding: 20px 0;
        }
        .header .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { color: white; font-size: 1.5rem; }
        .user-info { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.2); padding: 8px 18px; border-radius: 30px; }
        .logout-btn { background: var(--red); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .logout-btn:hover { background: #c0392b; transform: translateY(-2px); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        .stat-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .stat-card .stat-icon { font-size: 2rem; color: var(--primary-blue); margin-bottom: 10px; }
        .stat-card .stat-number { font-size: 2rem; font-weight: 700; color: var(--primary-blue); }
        .stat-card .stat-label { font-size: 0.8rem; color: #666; }
        
        .courses-section {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .section-header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-yellow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .section-header h3 { font-size: 1.2rem; }
        .filter-btn-active {
            background: var(--primary-blue);
            color: white;
            padding: 6px 14px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .filter-btn-inactive {
            background: #95a5a6;
            color: white;
            padding: 6px 14px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .course-card {
            border: 1px solid #eee;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .course-card:hover { box-shadow: var(--shadow); transform: translateX(5px); }
        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        .course-title { font-weight: 700; font-size: 1.1rem; color: var(--primary-blue); }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-scheduled { background: rgba(52,152,219,0.1); color: #3498db; }
        .status-pending { background: rgba(243,156,18,0.1); color: var(--orange); }
        .status-in-progress { background: rgba(46,204,113,0.1); color: #2ecc71; }
        .status-completed { background: rgba(46,204,113,0.1); color: #2ecc71; }
        
        .course-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin: 10px 0;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        .detail-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .detail-item i { width: 20px; color: var(--primary-blue); }
        .detail-item a { color: var(--primary-blue); text-decoration: none; }
        .detail-item a:hover { text-decoration: underline; }
        
        .course-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .action-btn:hover { transform: translateY(-2px); filter: brightness(0.95); }
        .btn-start { background: var(--green); color: white; }
        .btn-end { background: var(--red); color: white; }
        .btn-edit { background: #3498db; color: white; }
        .btn-material { background: #9b59b6; color: white; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-content {
            background: white;
            border-radius: var(--border-radius);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }
        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 1.4rem; color: var(--primary-blue); }
        .close-modal { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999; transition: all 0.2s; }
        .close-modal:hover { color: var(--red); }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: var(--primary-blue); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(0,64,128,0.1);
        }
        
        .form-actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px; }
        .cancel-btn { padding: 10px 20px; background: #eee; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .cancel-btn:hover { background: #ddd; }
        .save-btn { padding: 10px 20px; background: var(--green); color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .save-btn:hover { background: #219653; transform: translateY(-2px); }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            z-index: 1100;
            animation: slideInRight 0.3s ease;
            box-shadow: var(--shadow);
        }
        .toast-success { background: var(--green); }
        .toast-error { background: var(--red); }
        .toast-warning { background: var(--orange); }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .footer { background: var(--primary-blue); color: white; text-align: center; padding: 20px; margin-top: 40px; }
        .empty-state { text-align: center; padding: 40px; color: #999; font-size: 1rem; }
        
        .rating-stars-display {
            display: inline-flex;
            gap: 2px;
            margin-left: 5px;
        }
        .star-small { color: #f1c40f; font-size: 0.8rem; }
        .star-small.empty { color: #ddd; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1><i class="fas fa-chalkboard-user"></i> Espace intervenant</h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="user-info"><i class="fas fa-user-circle"></i><span id="teacherName">Chargement...</span></div>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
            </div>
        </div>
    </header>
    
    <main class="container" style="padding: 30px 0;">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-check"></i></div><div class="stat-number" id="upcomingCount">0</div><div class="stat-label">Cours à venir</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-number" id="totalStudents">0</div><div class="stat-label">Élèves</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-star"></i></div><div class="stat-number" id="avgRating">0</div><div class="stat-label">Note moyenne</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-number" id="completedCount">0</div><div class="stat-label">Cours terminés</div></div>
        </div>
        
        <div class="courses-section">
            <div class="section-header">
                <h3><i class="fas fa-calendar-day"></i> Mes cours programmés</h3>
                <div style="display: flex; gap: 10px;">
                    <button id="showUpcomingBtn" class="filter-btn-active">📅 À venir</button>
                    <button id="showPastBtn" class="filter-btn-inactive">📜 Terminés</button>
                </div>
            </div>
            <div id="coursesList"><div class="empty-state">Chargement...</div></div>
        </div>
    </main>
    
    <footer class="footer"><div class="container"><p>&copy; 2025 Association Mille Voiles</p></div></footer>
    
    <!-- Modal modification cours (lieu + lien meet) -->
    <div class="modal" id="editCourseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title"><i class="fas fa-edit"></i> Modifier le cours</h2>
                <button class="close-modal" id="closeEditModalBtn">&times;</button>
            </div>
            <form id="editCourseForm">
                <input type="hidden" id="editCourseId">
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Lieu</label>
                    <input type="text" id="editLocation" placeholder="Salle, adresse...">
                </div>
                <div class="form-group">
                    <label><i class="fab fa-google"></i> Lien Google Meet</label>
                    <input type="url" id="editMeetingLink" placeholder="https://meet.google.com/...">
                    <small style="display: block; margin-top: 5px; color: #666;">Les étudiants pourront cliquer pour rejoindre</small>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" id="cancelEditBtn">Annuler</button>
                    <button type="submit" class="save-btn">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Modal partage support / commentaire -->
    <div class="modal" id="materialModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title"><i class="fas fa-paperclip"></i> Partager un support</h2>
                <button class="close-modal" id="closeMaterialBtn">&times;</button>
            </div>
            <form id="materialForm">
                <input type="hidden" id="materialCourseId">
                <div class="form-group">
                    <label><i class="fas fa-link"></i> Lien du support / cours</label>
                    <input type="url" id="materialLink" placeholder="https://...">
                    <small style="display: block; margin-top: 5px; color: #666;">Les étudiants pourront consulter ce lien</small>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-comment"></i> Commentaire sur le cours</label>
                    <textarea id="teacherComment" rows="4" placeholder="Appréciation, points à améliorer, résumé du cours..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" id="cancelMaterialBtn">Annuler</button>
                    <button type="submit" class="save-btn">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // ========== 全局变量 ==========
        let currentTeacher = null;
        let allCourses = [];
        let showOnlyUpcoming = true;  // true=即将上课, false=历史课程
        
        // ========== 获取用户信息 ==========
        function getTeacherFromToken() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (!token) { window.location.href = 'index.html'; return null; }
            try {
                const data = JSON.parse(decodeURIComponent(atob(token)));
                if (data.role !== 'teacher') { window.location.href = 'index.html'; return null; }
                return data;
            } catch(e) { window.location.href = 'index.html'; return null; }
        }
        
        // ========== 获取过滤后的课程 ==========
        function getFilteredCourses() {
            const now = new Date();
            if (showOnlyUpcoming) {
                // 即将上课：所有未完成、未取消的课程（不管时间是否已过，老师可以补点开始）
                return allCourses.filter(c => c.status !== 'completed' && c.status !== 'cancelled');
            } else {
                // 历史课程：已完成 或 已取消
                return allCourses.filter(c => c.status === 'completed' || c.status === 'cancelled');
            }
        }
        
        // ========== 加载课程 ==========
        async function loadCourses() {
            const supabase = window.supabaseAuth.getSupabaseClient();
            const { data } = await supabase
                .from('courses')
                .select(`
                    *,
                    students:student_id(id, name)
                `)
                .eq('teacher_id', currentTeacher.userId)
                .order('start_time', { ascending: true });
            allCourses = data || [];
            
            const now = new Date();
            const upcoming = allCourses.filter(c => new Date(c.start_time) > now && c.status !== 'completed' && c.status !== 'cancelled');
            const completed = allCourses.filter(c => c.status === 'completed');
            const uniqueStudents = new Set(allCourses.map(c => c.student_id)).size;
            const rated = allCourses.filter(c => c.student_rating);
            const avg = rated.length ? (rated.reduce((s,c)=>s+c.student_rating,0)/rated.length).toFixed(1) : 0;
            
            document.getElementById('upcomingCount').textContent = upcoming.length;
            document.getElementById('totalStudents').textContent = uniqueStudents;
            document.getElementById('avgRating').textContent = avg;
            document.getElementById('completedCount').textContent = completed.length;
            
            renderCoursesList();
        }
        
        // ========== 课程类型显示 ==========
        function getTypeText(t) { 
            const types = {
                'training': '📚 培训内容',
                '4year': '🎫 四年卡',
                '10year': '🎟️ 十年卡',
                'naturalization': '🛂 入籍',
                'ec': '1️⃣ 公民考试',
                'ec110': '📚 十年卡全能班',
                'ec14': '🎫 四年卡全能班',
                'ec1f': '🛂 入籍全能班',
                'ec210': '📚 十年卡速成',
                'ec24': '🎫 四年卡速成',
                'ec2f': '🛂 入籍速成',
                'ec310': '📚 十年卡自选',
                'ec34': '🎫 四年卡自选',
                'ec3f': '🛂 入籍自选'
            };
            return types[t] || t;
        }
        
        // ========== 格式化日期时间 ==========
        function formatDateTime(d) { 
            if (!d) return '-';
            const date = new Date(d);
            return `${date.getDate().toString().padStart(2,'0')}/${(date.getMonth()+1).toString().padStart(2,'0')}/${date.getFullYear()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`; 
        }
        
        function calculateEndTime(startTimeStr, duration) {
            let d = new Date(startTimeStr);
            d.setHours(d.getHours() + (duration || 2));
            return d;
        }
        
        function formatTimeRange(startTime, duration) {
            const start = new Date(startTime);
            const end = calculateEndTime(startTime, duration);
            return `${start.getHours().toString().padStart(2,'0')}:${start.getMinutes().toString().padStart(2,'0')} - ${end.getHours().toString().padStart(2,'0')}:${end.getMinutes().toString().padStart(2,'0')}`;
        }
        
        // ========== 显示星级 ==========
        function renderStars(rating) {
            if (!rating) return '';
            let html = '<span class="rating-stars-display">';
            for (let i = 1; i <= 5; i++) {
                html += `<i class="fas fa-star star-small ${i > rating ? 'empty' : ''}"></i>`;
            }
            html += ` ${rating}/5</span>`;
            return html;
        }
        
        // ========== 渲染课程列表 ==========
        function renderCoursesList() {
            const container = document.getElementById('coursesList');
            if (!container) return;
            
            const filteredCourses = getFilteredCourses();
            
            if (filteredCourses.length === 0) { 
                const emptyMsg = showOnlyUpcoming ? '📭 Aucun cours à venir' : '📭 Aucun cours terminé';
                container.innerHTML = `<div class="empty-state">${emptyMsg}</div>`; 
                return; 
            }
            
            container.innerHTML = filteredCourses.map(c => {
                const now = new Date();
                const courseStart = new Date(c.start_time);
                const courseEnd = calculateEndTime(c.start_time, c.duration || 2);
                const isNow = courseStart <= now && courseEnd >= now;
                
                let statusText = '', statusClass = '';
                if (c.status === 'completed') {
                    statusText = '✅ Terminé';
                    statusClass = 'status-completed';
                } else if (c.teacher_started && c.student_confirmed && isNow) {
                    statusText = '🔄 En cours';
                    statusClass = 'status-in-progress';
                } else if (c.teacher_started && !c.student_confirmed && isNow) {
                    statusText = '⏳ En attente élève';
                    statusClass = 'status-pending';
                } else if (courseStart > now) {
                    statusText = '📅 Planifié';
                    statusClass = 'status-scheduled';
                } else {
                    statusText = '📅 Planifié';
                    statusClass = 'status-scheduled';
                }
                
                const timeRange = formatTimeRange(c.start_time, c.duration || 2);
                
                return `
                    <div class="course-card">
                        <div class="course-header">
                            <span class="course-title">${getTypeText(c.course_type)} - ${formatDateTime(c.start_time)} (${timeRange})</span>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <div class="course-details">
                            <div class="detail-item"><i class="fas fa-user-graduate"></i> Élève: ${escapeHtml(c.students?.name || 'N/A')}</div>
                            <div class="detail-item"><i class="fas fa-map-marker-alt"></i> ${c.location || '📍 À définir'}</div>
                            <div class="detail-item"><i class="fas fa-video"></i> ${c.meeting_link ? `<a href="${c.meeting_link}" target="_blank">🔗 Lien Meet</a>` : '📹 Non défini'}</div>
                            ${c.material_link ? `<div class="detail-item"><i class="fas fa-paperclip"></i> <a href="${c.material_link}" target="_blank">📎 Support de cours</a></div>` : ''}
                            ${c.student_rating ? `<div class="detail-item"><i class="fas fa-star"></i> Note élève: ${renderStars(c.student_rating)}</div>` : ''}
                            ${c.student_comment ? `<div class="detail-item"><i class="fas fa-comment-dots"></i> Commentaire élève: "${escapeHtml(c.student_comment)}"</div>` : ''}
                            ${c.teacher_comment ? `<div class="detail-item"><i class="fas fa-comment"></i> Votre commentaire: "${escapeHtml(c.teacher_comment)}"</div>` : ''}
                        </div>
                       <div class="course-actions">
                        ${c.status !== 'completed' && c.status !== 'cancelled' ? `<button class="action-btn btn-edit" onclick="openEditCourse('${c.id}','${escapeHtml(c.location||'')}','${escapeHtml(c.meeting_link||'')}')"><i class="fas fa-map-marker-alt"></i> 📍 Lieu / Meet</button>` : ''}
                        ${!c.teacher_started && c.status !== 'completed' && c.status !== 'cancelled' ? `<button class="action-btn btn-start" onclick="startCourse('${c.id}')"><i class="fas fa-play"></i> ▶️ Démarrer le cours</button>` : ''}
                        ${c.teacher_started && !c.student_confirmed ? `<span class="action-btn" style="background:#f39c12; color:white; cursor:default;"><i class="fas fa-hourglass-half"></i> ⏳ Attente confirmation élève</span>` : ''}
                        ${c.teacher_started && c.status !== 'completed' ? `<button class="action-btn btn-end" onclick="endCourse('${c.id}')"><i class="fas fa-stop"></i> ⏹️ Terminer</button>` : ''}
                        ${c.status !== 'completed' && c.status !== 'cancelled' ? `<button class="action-btn btn-material" onclick="openMaterialModal('${c.id}','${escapeHtml(c.material_link||'')}','${escapeHtml(c.teacher_comment||'')}')"><i class="fas fa-paperclip"></i> 📎 Support / Commentaire</button>` : ''}
                        ${c.status === 'completed' && !c.teacher_comment ? `<button class="action-btn btn-material" onclick="openMaterialModal('${c.id}','${escapeHtml(c.material_link||'')}','${escapeHtml(c.teacher_comment||'')}')"><i class="fas fa-comment"></i> 💬 Ajouter commentaire</button>` : ''}
                    </div>
                    </div>
                `;
            }).join('');
        }
        
        // ========== 课程操作 ==========
        function openEditCourse(courseId, location, meetLink) {
            document.getElementById('editCourseId').value = courseId;
            document.getElementById('editLocation').value = location;
            document.getElementById('editMeetingLink').value = meetLink;
            document.getElementById('editCourseModal').style.display = 'flex';
        }
        
        async function saveCourseEdit(e) {
            e.preventDefault();
            const supabase = window.supabaseAuth.getSupabaseClient();
            const id = document.getElementById('editCourseId').value;
            await supabase.from('courses').update({
                location: document.getElementById('editLocation').value || null,
                meeting_link: document.getElementById('editMeetingLink').value || null
            }).eq('id', id);
            document.getElementById('editCourseModal').style.display = 'none';
            showToast('Informations mises à jour ✓', 'success');
            await loadCourses();
        }
        
        async function startCourse(id) {
            const supabase = window.supabaseAuth.getSupabaseClient();
            const { error } = await supabase
                .from('courses')
                .update({ 
                    teacher_started: true, 
                    actual_start: new Date().toISOString(), 
                    status: 'in_progress' 
                })
                .eq('id', id);
            if (error) { showToast('Erreur lors du démarrage', 'error'); return; }
            showToast('Cours démarré ! En attente de la confirmation de l\'élève ✓', 'success');
            await loadCourses();
        }
        
        async function endCourse(id) {
            const supabase = window.supabaseAuth.getSupabaseClient();
            const { error } = await supabase
                .from('courses')
                .update({ 
                    actual_end: new Date().toISOString(), 
                    status: 'completed' 
                })
                .eq('id', id);
            if (error) { showToast('Erreur', 'error'); return; }
            showToast('Cours terminé ! Vous pouvez maintenant ajouter un commentaire ✓', 'success');
            await loadCourses();
        }
        
        function openMaterialModal(courseId, materialLink, teacherComment) {
            document.getElementById('materialCourseId').value = courseId;
            document.getElementById('materialLink').value = materialLink || '';
            document.getElementById('teacherComment').value = teacherComment || '';
            document.getElementById('materialModal').style.display = 'flex';
        }
        
        async function saveMaterial(e) {
            e.preventDefault();
            const supabase = window.supabaseAuth.getSupabaseClient();
            const id = document.getElementById('materialCourseId').value;
            await supabase.from('courses').update({
                material_link: document.getElementById('materialLink').value || null,
                teacher_comment: document.getElementById('teacherComment').value || null
            }).eq('id', id);
            document.getElementById('materialModal').style.display = 'none';
            showToast('Support et commentaire enregistrés ✓', 'success');
            await loadCourses();
        }
        
        // ========== 辅助函数 ==========
        function escapeHtml(s) { 
            if (!s) return '';
            return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); 
        }
        
        function showToast(msg, type) { 
            const t = document.createElement('div'); 
            t.className = `toast toast-${type}`; 
            t.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`; 
            document.body.appendChild(t); 
            setTimeout(() => t.remove(), 3000); 
        }
        
        // ========== 初始化模态框和过滤器 ==========
        function initModals() {
            document.getElementById('closeEditModalBtn').onclick = () => document.getElementById('editCourseModal').style.display = 'none';
            document.getElementById('cancelEditBtn').onclick = () => document.getElementById('editCourseModal').style.display = 'none';
            document.getElementById('closeMaterialBtn').onclick = () => document.getElementById('materialModal').style.display = 'none';
            document.getElementById('cancelMaterialBtn').onclick = () => document.getElementById('materialModal').style.display = 'none';
            document.getElementById('editCourseForm').addEventListener('submit', saveCourseEdit);
            document.getElementById('materialForm').addEventListener('submit', saveMaterial);
            
            window.onclick = (e) => {
                if (e.target === document.getElementById('editCourseModal')) document.getElementById('editCourseModal').style.display = 'none';
                if (e.target === document.getElementById('materialModal')) document.getElementById('materialModal').style.display = 'none';
            };
        }
        
        function initFilters() {
            const upcomingBtn = document.getElementById('showUpcomingBtn');
            const pastBtn = document.getElementById('showPastBtn');
            
            upcomingBtn.onclick = () => {
                showOnlyUpcoming = true;
                upcomingBtn.className = 'filter-btn-active';
                pastBtn.className = 'filter-btn-inactive';
                renderCoursesList();
            };
            
            pastBtn.onclick = () => {
                showOnlyUpcoming = false;
                pastBtn.className = 'filter-btn-active';
                upcomingBtn.className = 'filter-btn-inactive';
                renderCoursesList();
            };
        }
        
        // ========== 初始化 ==========
        async function init() {
            currentTeacher = getTeacherFromToken();
            if (!currentTeacher) return;
            document.getElementById('teacherName').textContent = currentTeacher.name;
            document.getElementById('logoutBtn').onclick = () => window.location.href = 'index.html';
            initModals();
            initFilters();
            await loadCourses();
        }
        
        init();
        
        window.openEditCourse = openEditCourse;
        window.startCourse = startCourse;
        window.endCourse = endCourse;
        window.openMaterialModal = openMaterialModal;
    </script>
</body>
</html>
