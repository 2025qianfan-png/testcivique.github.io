<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --primary-blue: #004080;
    --primary-light-blue: #0066cc;
    --primary-yellow: #ffd633;
    --green: #27ae60;
    --red: #e74c3c;
    --orange: #f39c12;
    --gray: #95a5a6;
    --shadow: 0 10px 30px rgba(0,0,0,0.08);
    --border-radius: 12px;
}
body {
    font-family: 'Open Sans', sans-serif;
    background: #f5f7fa;
    color: #333;
    min-height: 100vh;
}
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px;
    width: 100%;
}

/* 响应式断点 */
@media (max-width: 768px) {
    .container {
        padding: 0 15px;
    }
}

.header {
    background: linear-gradient(135deg, var(--primary-blue), var(--primary-light-blue));
    color: white;
    padding: 15px 0;
}
.header .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
}
.header h1 {
    color: white;
    font-size: 1.5rem;
}
@media (max-width: 768px) {
    .header h1 {
        font-size: 1.2rem;
    }
}
.lang-switch {
    display: flex;
    gap: 8px;
}
.lang-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}
.lang-btn.active {
    background: var(--primary-yellow);
    color: var(--primary-blue);
}
.user-info {
    display: flex;
    align-items: center;
    gap: 15px;
    background: rgba(255,255,255,0.2);
    padding: 8px 18px;
    border-radius: 30px;
}
@media (max-width: 480px) {
    .user-info {
        padding: 6px 12px;
        gap: 8px;
        font-size: 0.85rem;
    }
}
.logout-btn {
    background: var(--red);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
}

/* 统计卡片网格 */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin: 30px 0;
}
.credit-stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    margin: 0 0 30px 0;
}
@media (max-width: 768px) {
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }
    .credit-stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }
}
@media (max-width: 480px) {
    .stats-grid {
        grid-template-columns: 1fr;
    }
    .credit-stats-grid {
        grid-template-columns: 1fr;
    }
}
.stat-card {
    background: white;
    border-radius: var(--border-radius);
    padding: 20px;
    text-align: center;
    box-shadow: var(--shadow);
    transition: all 0.3s;
}
.stat-card:hover {
    transform: translateY(-5px);
}
.stat-card .stat-icon {
    font-size: 2rem;
    margin-bottom: 10px;
}
.stat-card .stat-number {
    font-size: 2rem;
    font-weight: 700;
}
@media (max-width: 480px) {
    .stat-card .stat-number {
        font-size: 1.5rem;
    }
}
.stat-card .stat-label {
    font-size: 0.75rem;
    opacity: 0.9;
}

/* 课时卡片颜色 */
.credit-blue { background: linear-gradient(135deg, #004080, #0066cc); color: white; }
.credit-green { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
.credit-orange { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
.credit-purple { background: linear-gradient(135deg, #8e44ad, #9b59b6); color: white; }
.credit-red { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }

.courses-section {
    background: white;
    border-radius: var(--border-radius);
    padding: 20px;
    box-shadow: var(--shadow);
}
@media (max-width: 768px) {
    .courses-section {
        padding: 15px;
    }
}
.section-header {
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--primary-yellow);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}
.section-header h3 {
    font-size: 1.2rem;
}
@media (max-width: 480px) {
    .section-header h3 {
        font-size: 1rem;
    }
}

.filter-btn-active {
    background: var(--primary-blue);
    color: white;
    padding: 6px 14px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
}
.filter-btn-inactive {
    background: #95a5a6;
    color: white;
    padding: 6px 14px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
}
@media (max-width: 480px) {
    .filter-btn-active, .filter-btn-inactive {
        padding: 4px 10px;
        font-size: 0.75rem;
    }
}

.course-card {
    border: 1px solid #eee;
    border-radius: var(--border-radius);
    padding: 20px;
    margin-bottom: 15px;
    transition: all 0.3s;
}
.course-card:hover {
    box-shadow: var(--shadow);
}
@media (max-width: 768px) {
    .course-card {
        padding: 15px;
    }
}
.course-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 15px;
}
.course-title {
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--primary-blue);
}
@media (max-width: 480px) {
    .course-title {
        font-size: 0.9rem;
    }
}
.status-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
}
.status-scheduled { background: rgba(52,152,219,0.1); color: #3498db; }
.status-pending { background: rgba(243,156,18,0.1); color: var(--orange); }
.status-in-progress { background: rgba(46,204,113,0.1); color: #2ecc71; }
.status-completed { background: rgba(46,204,113,0.1); color: #2ecc71; }

.course-details {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 10px;
    margin: 10px 0;
    padding: 10px;
    background: #f9f9f9;
    border-radius: 8px;
}
@media (max-width: 480px) {
    .course-details {
        grid-template-columns: 1fr;
        gap: 8px;
    }
}
.detail-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    flex-wrap: wrap;
}
.detail-item i {
    width: 20px;
    color: var(--primary-blue);
}
.detail-item a {
    color: var(--primary-blue);
    text-decoration: none;
    word-break: break-all;
}
.detail-item a:hover {
    text-decoration: underline;
}

.course-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 15px;
}
@media (max-width: 480px) {
    .course-actions {
        gap: 8px;
    }
    .action-btn {
        padding: 6px 12px;
        font-size: 0.75rem;
    }
}
.action-btn {
    padding: 8px 16px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
}
.action-btn:hover {
    transform: translateY(-2px);
}
.btn-confirm { background: var(--green); color: white; }
.btn-rate { background: #f39c12; color: white; }

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 16px;
}
.modal-content {
    background: white;
    border-radius: var(--border-radius);
    padding: 30px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalSlideIn 0.3s ease;
}
@media (max-width: 480px) {
    .modal-content {
        padding: 20px;
    }
}
@keyframes modalSlideIn {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
.modal-title {
    font-size: 1.4rem;
    color: var(--primary-blue);
}
@media (max-width: 480px) {
    .modal-title {
        font-size: 1.2rem;
    }
}
.close-modal {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #999;
}
.close-modal:hover {
    color: var(--red);
}

.form-group {
    margin-bottom: 15px;
}
.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
    color: var(--primary-blue);
}
.form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-family: inherit;
}
.form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 15px;
    margin-top: 20px;
}
.cancel-btn {
    padding: 10px 20px;
    background: #eee;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
}
.save-btn {
    padding: 10px 20px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
}
.save-btn:hover {
    background: #219653;
    transform: translateY(-2px);
}

.rating-stars {
    display: flex;
    gap: 10px;
    margin: 15px 0;
    justify-content: center;
}
.star {
    font-size: 2rem;
    cursor: pointer;
    color: #ddd;
}
.star.active {
    color: #f1c40f;
}

.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px 24px;
    border-radius: 30px;
    color: white;
    font-weight: 600;
    z-index: 1100;
    animation: slideInRight 0.3s ease;
}
@media (max-width: 480px) {
    .toast {
        bottom: 10px;
        right: 10px;
        left: 10px;
        padding: 10px 16px;
        font-size: 0.85rem;
    }
}
.toast-success { background: var(--green); }
.toast-error { background: var(--red); }
.toast-warning { background: var(--orange); }
@keyframes slideInRight {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
}

.footer {
    background: var(--primary-blue);
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 40px;
}
@media (max-width: 768px) {
    .footer {
        padding: 15px;
        font-size: 0.8rem;
    }
}
.empty-state {
    text-align: center;
    padding: 40px;
    color: #999;
}

.teacher-comment-area {
    margin-top: 10px;
    padding: 10px;
    background: #e8f5e9;
    border-radius: 8px;
}
.teacher-comment-area i {
    color: var(--primary-blue);
    margin-right: 5px;
}
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1><i class="fas fa-user-graduate"></i> <span id="pageTitle">Espace étudiant</span></h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="lang-switch">
                    <button class="lang-btn active" id="langFrBtn" data-lang="fr">FR</button>
                    <button class="lang-btn" id="langZhBtn" data-lang="zh">中文</button>
                </div>
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="studentName">Chargement...</span>
                </div>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span id="logoutText">Déconnexion</span></button>
            </div>
        </div>
    </header>
    
    <main class="container" style="padding: 30px 0;">
        <!-- 第一行：课程统计 -->
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-check"></i></div><div class="stat-number" id="bookedCount">0</div><div class="stat-label" id="statBookedLabel">Cours à venir</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-number" id="completedCount">0</div><div class="stat-label" id="statCompletedLabel">Cours terminés</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-star"></i></div><div class="stat-number" id="avgRating">0</div><div class="stat-label" id="statRatingLabel">Note moyenne</div></div>
            <div class="stat-card"><div class="stat-icon"><i class="fas fa-chalkboard-user"></i></div><div class="stat-number" id="teacherCount">0</div><div class="stat-label" id="statTeacherLabel">Intervenants</div></div>
        </div>

        <!-- 第二行：课时统计卡片 -->
        <div class="credit-stats-grid">
            <div class="stat-card credit-blue">
                <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
                <div class="stat-number" id="totalCredit">0</div>
                <div class="stat-label" id="totalCreditLabel">📚 Crédits totaux</div>
            </div>
            <div class="stat-card credit-green">
                <div class="stat-icon"><i class="fas fa-book"></i></div>
                <div class="stat-number" id="scheduledHours">0</div>
                <div class="stat-label" id="scheduledHoursLabel">⏰ Heures programmées</div>
            </div>
            <div class="stat-card credit-orange">
                <div class="stat-icon"><i class="fas fa-play-circle"></i></div>
                <div class="stat-number" id="inProgressHours">0</div>
                <div class="stat-label" id="inProgressHoursLabel">🔄 En cours</div>
            </div>
            <div class="stat-card credit-purple">
                <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="stat-number" id="usedHours">0</div>
                <div class="stat-label" id="usedHoursLabel">✅ Heures consommées</div>
            </div>
            <div class="stat-card credit-red">
                <div class="stat-icon"><i class="fas fa-hourglass-end"></i></div>
                <div class="stat-number" id="remainingCredit">0</div>
                <div class="stat-label" id="remainingCreditLabel">⏳ Restant</div>
            </div>
        </div>
        
        <div class="courses-section">
            <div class="section-header">
                <h3 id="myCoursesTitle"><i class="fas fa-calendar-day"></i> Mes cours</h3>
                <div style="display: flex; gap: 10px;">
                    <button id="showUpcomingBtn" class="filter-btn-active">📅 À venir</button>
                    <button id="showPastBtn" class="filter-btn-inactive">📜 Historique</button>
                </div>
            </div>
            <div id="coursesList"><div class="empty-state" id="emptyCoursesMsg">Chargement...</div></div>
        </div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Association Mille Voiles</p>
        </div>
    </footer>
    
    <!-- 评价模态框 -->
    <div class="modal" id="ratingModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="ratingTitle"><i class="fas fa-star"></i> Évaluer le cours</h2>
                <button class="close-modal" id="closeRatingModalBtn">&times;</button>
            </div>
            <form id="ratingForm">
                <input type="hidden" id="ratingCourseId">
                <div class="form-group">
                    <label id="ratingLabel">Note (1 à 5)</label>
                    <div class="rating-stars" id="ratingStars">
                        <span class="star" data-value="1">★</span>
                        <span class="star" data-value="2">★</span>
                        <span class="star" data-value="3">★</span>
                        <span class="star" data-value="4">★</span>
                        <span class="star" data-value="5">★</span>
                    </div>
                    <input type="hidden" id="studentRating">
                </div>
                <div class="form-group">
                    <label id="commentLabel">Commentaire</label>
                    <textarea id="studentComment" rows="3" placeholder="Votre retour sur le cours..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" id="cancelRatingBtn"><span id="cancelRatingText">Annuler</span></button>
                    <button type="submit" class="save-btn"><span id="saveRatingText">Envoyer</span></button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 教师评语模态框 -->
    <div class="modal" id="teacherCommentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title"><i class="fas fa-chalkboard-user"></i> <span id="teacherCommentTitle">Avis de l'intervenant</span></h2>
                <button class="close-modal" id="closeTeacherCommentBtn">&times;</button>
            </div>
            <div id="teacherCommentContent" style="padding: 10px 0; line-height: 1.6;"></div>
            <div class="form-actions">
                <button type="button" class="cancel-btn" id="closeTeacherCommentModalBtn">Fermer</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 双语翻译 ==========
        const translations = {
            fr: {
                pageTitle: "Espace étudiant",
                logoutText: "Déconnexion",
                statBookedLabel: "Cours à venir",
                statCompletedLabel: "Cours terminés",
                statRatingLabel: "Note moyenne",
                statTeacherLabel: "Intervenants",
                totalCreditLabel: "📚 Crédits totaux",
                scheduledHoursLabel: "⏰ Heures programmées",
                inProgressHoursLabel: "🔄 En cours",
                usedHoursLabel: "✅ Heures consommées",
                remainingCreditLabel: "⏳ Restant",
                myCoursesTitle: "Mes cours",
                emptyCoursesUpcoming: "📭 Aucun cours à venir",
                emptyCoursesPast: "📭 Aucun cours passé",
                ratingTitle: "Évaluer le cours",
                ratingLabel: "Note (1 à 5)",
                commentLabel: "Commentaire",
                saveRatingText: "Envoyer",
                cancelRatingText: "Annuler",
                confirmPresence: "Confirmer ma présence",
                evaluate: "Évaluer",
                toastConfirmed: "Présence confirmée",
                toastError: "Erreur",
                toastRating: "Merci pour votre évaluation !",
                teacherCommentTitle: "Avis de l'intervenant",
                closeText: "Fermer",
                teacherCommentLabel: "Avis du professeur:",
                statusScheduled: "📅 Planifié",
                statusInProgress: "🔄 En cours",
                statusCompleted: "✅ Terminé",
                pendingConfirm: "En attente de confirmation",
                teacherCommentBtn: "Voir l'avis",
                creditInfo: "Crédits restants"
            },
            zh: {
                pageTitle: "学生空间",
                logoutText: "退出登录",
                statBookedLabel: "即将上课",
                statCompletedLabel: "已完成课程",
                statRatingLabel: "平均评分",
                statTeacherLabel: "老师人数",
                totalCreditLabel: "📚 总课时",
                scheduledHoursLabel: "⏰ 已计划时数",
                inProgressHoursLabel: "🔄 进行中时数",
                usedHoursLabel: "✅ 已使用时数",
                remainingCreditLabel: "⏳ 剩余时数",
                myCoursesTitle: "我的课程",
                emptyCoursesUpcoming: "📭 暂无即将开始的课程",
                emptyCoursesPast: "📭 暂无历史课程",
                ratingTitle: "评价课程",
                ratingLabel: "评分 (1到5)",
                commentLabel: "评论",
                saveRatingText: "提交",
                cancelRatingText: "取消",
                confirmPresence: "确认出席",
                evaluate: "评价",
                toastConfirmed: "出席已确认",
                toastError: "错误",
                toastRating: "感谢您的评价！",
                teacherCommentTitle: "老师的评语",
                closeText: "关闭",
                teacherCommentLabel: "老师评语:",
                statusScheduled: "📅 计划中",
                statusInProgress: "🔄 进行中",
                statusCompleted: "✅ 已完成",
                pendingConfirm: "等待您确认",
                teacherCommentBtn: "查看评语",
                creditInfo: "剩余课时"
            }
        };
        
        let currentLang = 'fr';
        let showOnlyUpcoming = true;
        let currentStudent = null;
        let myCourses = [];
        let studentCredit = 0;
        
        // ========== 更新界面文字 ==========
        function updateUIText() {
            const t = translations[currentLang];
            document.getElementById('pageTitle').textContent = t.pageTitle;
            document.getElementById('logoutText').textContent = t.logoutText;
            document.getElementById('statBookedLabel').textContent = t.statBookedLabel;
            document.getElementById('statCompletedLabel').textContent = t.statCompletedLabel;
            document.getElementById('statRatingLabel').textContent = t.statRatingLabel;
            document.getElementById('statTeacherLabel').textContent = t.statTeacherLabel;
            document.getElementById('totalCreditLabel').textContent = t.totalCreditLabel;
            document.getElementById('scheduledHoursLabel').textContent = t.scheduledHoursLabel;
            document.getElementById('inProgressHoursLabel').textContent = t.inProgressHoursLabel;
            document.getElementById('usedHoursLabel').textContent = t.usedHoursLabel;
            document.getElementById('remainingCreditLabel').textContent = t.remainingCreditLabel;
            document.getElementById('myCoursesTitle').innerHTML = `<i class="fas fa-calendar-day"></i> ${t.myCoursesTitle}`;
            document.getElementById('ratingTitle').innerHTML = `<i class="fas fa-star"></i> ${t.ratingTitle}`;
            document.getElementById('ratingLabel').textContent = t.ratingLabel;
            document.getElementById('commentLabel').textContent = t.commentLabel;
            document.getElementById('saveRatingText').textContent = t.saveRatingText;
            document.getElementById('cancelRatingText').textContent = t.cancelRatingText;
            document.getElementById('teacherCommentTitle').textContent = t.teacherCommentTitle;
            document.getElementById('closeTeacherCommentModalBtn').textContent = t.closeText;
            renderCoursesList();
        }
        
        function switchLanguage(lang) {
            currentLang = lang;
            document.getElementById('langFrBtn').classList.toggle('active', lang === 'fr');
            document.getElementById('langZhBtn').classList.toggle('active', lang === 'zh');
            updateUIText();
        }
        
        // ========== 辅助函数 ==========
        function getTypeText(t) {
               const types = {
                'ec': '1️⃣ 公民考试',
                'ec110': '📚 十年卡全能班',
                'ec14': '🎫 四年卡全能班',
                'ec1f': '🛂 入籍全能班',
                'ec210': '📚 十年卡速成',
                'ec24': '🎫 四年卡速成',
                'ec2f': '🛂 入籍速成',
                'ec310': '📚 十年卡自选',
                'ec34': '🎫 四年卡自选',
                'ec3f': '🛂 入籍自选',
                'ex10': '📝 十年卡模拟考试',  // 改成你想要的图标
                'ex4': '📝 四年卡模拟考试' , // 改成你想要的图标
                'exf': '📝 入籍模拟考试'  // 改成你想要的图标

            };
           return types[t] || t;
        }
        
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            let d = new Date(dateStr);
            return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        }
        
        function calculateEndTime(startTimeStr, duration) {
            let d = new Date(startTimeStr);
            d.setHours(d.getHours() + (duration || 2));
            return d;
        }
        
        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }
        
        function showToast(msg, type) {
            const t = translations[currentLang];
            const toastMsg = type === 'success' ? msg : (t.toastError + ': ' + msg);
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${toastMsg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // ========== 课时统计更新 ==========
      // ========== 课时统计更新 ==========
// ========== 课时统计更新 ==========
function updateCreditStats() {
    // 剩余课时（直接从数据库读取）
    const remainingCredit = studentCredit || 0;
    
    // 已计划课时（scheduled 状态）
    const scheduledCourses = myCourses.filter(c => c.status === 'scheduled');
    const scheduledHours = scheduledCourses.reduce((sum, c) => sum + (c.duration || 2), 0);
    
    // 进行中课时（in_progress 状态）
    const inProgressCourses = myCourses.filter(c => c.status === 'in_progress');
    const inProgressHours = inProgressCourses.reduce((sum, c) => sum + (c.duration || 2), 0);
    
    // 已使用时数（completed 状态）
    const completedCourses = myCourses.filter(c => c.status === 'completed');
    const usedHours = completedCourses.reduce((sum, c) => sum + (c.duration || 2), 0);
    
    // 总消耗 + 剩余 = 原始总课时（用于显示）
    const totalSpent = usedHours + inProgressHours + scheduledHours;
    const originalTotal = totalSpent + remainingCredit;
    
    document.getElementById('totalCredit').textContent = originalTotal;
    document.getElementById('scheduledHours').textContent = scheduledHours;
    document.getElementById('inProgressHours').textContent = inProgressHours;
    document.getElementById('usedHours').textContent = usedHours;
    document.getElementById('remainingCredit').textContent = remainingCredit;
}
        // ========== 课程过滤 ==========
        function getFilteredCourses() {
            if (showOnlyUpcoming) {
                return myCourses.filter(c => c.status !== 'completed');
            } else {
                return myCourses.filter(c => c.status === 'completed');
            }
        }
        
        // ========== 渲染课程列表 ==========
        function renderCoursesList() {
            const container = document.getElementById('coursesList');
            const t = translations[currentLang];
            if (!container) return;
            
            const filteredCourses = getFilteredCourses();
            
            if (filteredCourses.length === 0) {
                const emptyMsg = showOnlyUpcoming ? t.emptyCoursesUpcoming : t.emptyCoursesPast;
                container.innerHTML = `<div class="empty-state">${emptyMsg}</div>`;
                return;
            }
            
            container.innerHTML = filteredCourses.map(c => {
                const teacher = c.teachers;
                const endTime = calculateEndTime(c.start_time, c.duration || 2);
                const timeDisplay = `${formatDateTime(c.start_time)} - ${endTime.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}`;
                
                let statusText = '', statusClass = '';
                const now = new Date();
                const courseStart = new Date(c.start_time);
                const courseEnd = endTime;
                
                if (c.status === 'completed') {
                    statusText = t.statusCompleted;
                    statusClass = 'status-completed';
                } else if (c.teacher_started && !c.student_confirmed && courseStart <= now && courseEnd >= now) {
                    statusText = t.pendingConfirm;
                    statusClass = 'status-pending';
                } else if (c.teacher_started && c.student_confirmed && courseStart <= now && courseEnd >= now) {
                    statusText = t.statusInProgress;
                    statusClass = 'status-in-progress';
                } else if (courseStart > now) {
                    statusText = t.statusScheduled;
                    statusClass = 'status-scheduled';
                } else {
                    statusText = t.statusScheduled;
                    statusClass = 'status-scheduled';
                }
                
                const canConfirm = c.teacher_started && !c.student_confirmed && courseStart <= now && courseEnd >= now;
                const canRate = c.status === 'completed' && !c.student_rating;
                const hasTeacherComment = c.teacher_comment && c.teacher_comment.trim() !== '';
                
                return `
                    <div class="course-card">
                        <div class="course-header">
                            <span class="course-title">${getTypeText(c.course_type)} - ${timeDisplay}</span>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <div class="course-details">
                            <div class="detail-item"><i class="fas fa-chalkboard-user"></i> ${currentLang === 'fr' ? 'Intervenant:' : '老师:'} ${escapeHtml(teacher?.name || 'N/A')}</div>
                            <div class="detail-item"><i class="fas fa-map-marker-alt"></i> ${c.location || (currentLang === 'fr' ? 'À définir' : '待定')}</div>
                            <div class="detail-item"><i class="fas fa-clock"></i> ${currentLang === 'fr' ? 'Durée:' : '时长:'} ${c.duration || 2} ${currentLang === 'fr' ? 'heures' : '小时'}</div>
                            ${c.material_link ? `<div class="detail-item"><i class="fas fa-link"></i> <a href="${c.material_link}" target="_blank">${currentLang === 'fr' ? 'Support' : '课件'}</a></div>` : ''}
                            ${c.meeting_link ? `<div class="detail-item"><i class="fas fa-video"></i> <a href="${c.meeting_link}" target="_blank">${currentLang === 'fr' ? 'Lien Meet' : '会议链接'}</a></div>` : ''}
                        </div>
                        ${hasTeacherComment ? `
                            <div class="teacher-comment-area">
                                <i class="fas fa-comment-dots"></i> <strong>${t.teacherCommentLabel}</strong>
                                <button class="action-btn btn-rate" style="margin-top: 5px; padding: 4px 12px; font-size: 0.75rem;" onclick="showTeacherComment('${escapeHtml(c.teacher_comment)}')">${t.teacherCommentBtn}</button>
                            </div>
                        ` : ''}
                        <div class="course-actions">
                            ${canConfirm ? `<button class="action-btn btn-confirm" onclick="confirmCourse('${c.id}')"><i class="fas fa-check-circle"></i> ${t.confirmPresence}</button>` : ''}
                            ${canRate ? `<button class="action-btn btn-rate" onclick="openRatingModal('${c.id}')"><i class="fas fa-star"></i> ${t.evaluate}</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ========== 用户验证 ==========
        async function getStudentFromToken() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (!token) { window.location.href = 'index.html'; return null; }
            try {
                const data = JSON.parse(decodeURIComponent(atob(token)));
                if (data.role !== 'stu') { window.location.href = 'index.html'; return null; }
                return data;
            } catch(e) { window.location.href = 'index.html'; return null; }
        }
        
        // ========== 加载课程和数据 ==========
        async function loadMyCourses() {
            const supabase = window.supabaseAuth.getSupabaseClient();
            
            const [coursesRes, studentRes] = await Promise.all([
                supabase
                    .from('courses')
                    .select(`*, teachers:teacher_id(id, name)`)
                    .eq('student_id', currentStudent.userId)
                    .order('start_time', { ascending: true }),
                supabase
                    .from('students')
                    .select('credit')
                    .eq('id', currentStudent.userId)
                    .single()
            ]);
            
            myCourses = coursesRes.data || [];
            studentCredit = studentRes.data?.credit || 0;
            
            const teacherIds = [...new Set(myCourses.map(c => c.teacher_id))];
            const { data: teacherData } = await supabase
                .from('students')
                .select('id, name')
                .in('id', teacherIds);
            
            const toCome = myCourses.filter(c => c.status !== 'completed' && new Date(c.start_time) > new Date()).length;
            const completed = myCourses.filter(c => c.status === 'completed' || c.student_rating).length;
            const rated = myCourses.filter(c => c.student_rating);
            const avg = rated.length ? (rated.reduce((s,c)=>s+c.student_rating,0)/rated.length).toFixed(1) : 0;
            
            document.getElementById('bookedCount').textContent = toCome;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('avgRating').textContent = avg;
            document.getElementById('teacherCount').textContent = teacherData?.length || 0;
            
            updateCreditStats();
            renderCoursesList();
        }
        
        // ========== 课程操作 ==========
        async function confirmCourse(courseId) {
            const supabase = window.supabaseAuth.getSupabaseClient();
            const t = translations[currentLang];
            const { error } = await supabase.from('courses').update({ 
                student_confirmed: true, 
                status: 'in_progress' 
            }).eq('id', courseId);
            if (error) { 
                showToast(t.toastError, 'error'); 
                return; 
            }
            showToast(t.toastConfirmed, 'success');
            await loadMyCourses();
        }
        
        function openRatingModal(courseId) {
            document.getElementById('ratingCourseId').value = courseId;
            document.getElementById('studentRating').value = '';
            document.getElementById('studentComment').value = '';
            updateStarDisplay(0);
            document.getElementById('ratingModal').style.display = 'flex';
        }
        
        function showTeacherComment(comment) {
            document.getElementById('teacherCommentContent').innerHTML = `<div style="padding: 15px; background: #f5f5f5; border-radius: 8px;">${escapeHtml(comment)}</div>`;
            document.getElementById('teacherCommentModal').style.display = 'flex';
        }
        
        function updateStarDisplay(rating) {
            document.querySelectorAll('#ratingStars .star').forEach((star, i) => { 
                if (i < rating) star.classList.add('active'); 
                else star.classList.remove('active'); 
            });
        }
        
        async function saveRating(e) {
            e.preventDefault();
            const supabase = window.supabaseAuth.getSupabaseClient();
            const t = translations[currentLang];
            const courseId = document.getElementById('ratingCourseId').value;
            const rating = parseInt(document.getElementById('studentRating').value);
            const comment = document.getElementById('studentComment').value;
            if (!rating || rating < 1 || rating > 5) { 
                showToast('Note 1-5', 'error'); 
                return; 
            }
            const { error } = await supabase.from('courses').update({ 
                student_rating: rating, 
                student_comment: comment || null 
            }).eq('id', courseId);
            if (error) { 
                showToast(t.toastError, 'error'); 
                return; 
            }
            document.getElementById('ratingModal').style.display = 'none';
            showToast(t.toastRating, 'success');
            await loadMyCourses();
        }
        
        // ========== 过滤器 ==========
        function initFilters() {
            const upcomingBtn = document.getElementById('showUpcomingBtn');
            const pastBtn = document.getElementById('showPastBtn');
            
            upcomingBtn.onclick = () => {
                showOnlyUpcoming = true;
                upcomingBtn.className = 'filter-btn-active';
                pastBtn.className = 'filter-btn-inactive';
                renderCoursesList();
            };
            
            pastBtn.onclick = () => {
                showOnlyUpcoming = false;
                pastBtn.className = 'filter-btn-active';
                upcomingBtn.className = 'filter-btn-inactive';
                renderCoursesList();
            };
        }
        
        function initModals() {
            document.getElementById('closeRatingModalBtn').onclick = () => document.getElementById('ratingModal').style.display = 'none';
            document.getElementById('cancelRatingBtn').onclick = () => document.getElementById('ratingModal').style.display = 'none';
            document.getElementById('ratingForm').addEventListener('submit', saveRating);
            
            document.getElementById('closeTeacherCommentBtn').onclick = () => document.getElementById('teacherCommentModal').style.display = 'none';
            document.getElementById('closeTeacherCommentModalBtn').onclick = () => document.getElementById('teacherCommentModal').style.display = 'none';
            document.getElementById('teacherCommentModal').onclick = (e) => {
                if (e.target === document.getElementById('teacherCommentModal')) 
                    document.getElementById('teacherCommentModal').style.display = 'none';
            };
            
            document.querySelectorAll('#ratingStars .star').forEach(star => { 
                star.addEventListener('click', () => { 
                    const val = parseInt(star.dataset.value); 
                    document.getElementById('studentRating').value = val; 
                    updateStarDisplay(val); 
                }); 
            });
            document.getElementById('ratingModal').onclick = (e) => {
                if (e.target === document.getElementById('ratingModal')) 
                    document.getElementById('ratingModal').style.display = 'none';
            };
            
            document.getElementById('langFrBtn').onclick = () => switchLanguage('fr');
            document.getElementById('langZhBtn').onclick = () => switchLanguage('zh');
        }
        
        // ========== 初始化 ==========
        async function init() {
            currentStudent = await getStudentFromToken();
            if (!currentStudent) return;
            document.getElementById('studentName').textContent = currentStudent.name;
            document.getElementById('logoutBtn').onclick = () => { 
                sessionStorage.clear(); 
                window.location.href = 'index.html'; 
            };
            updateUIText();
            initModals();
            initFilters();
            await loadMyCourses();
        }
        
        init();
        
        window.confirmCourse = confirmCourse;
        window.openRatingModal = openRatingModal;
        window.showTeacherComment = showTeacherComment;
    </script>
</body>
